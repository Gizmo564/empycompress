name: empycompress build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact: empy-linux-x64
          - os: macos-latest
            artifact: empy-macos-arm64
          - os: windows-latest
            artifact: empy-windows-x64.exe
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Linux system deps
        if: runner.os == 'Linux'
        run: sudo apt-get update -qq && sudo apt-get install -y gcc patchelf libfuse2

      - name: Windows C compiler
        if: runner.os == 'Windows'
        shell: pwsh
        run: choco install mingw --no-progress -y

      - name: Install Python deps
        run: pip install cryptography "nuitka>=2.4" zstandard ordered-set

      - name: Build macOS icon
        if: runner.os == 'macOS'
        run: |
          pip install pillow -q
          python3 -c "
          from PIL import Image
          import os
          os.makedirs('icon.iconset', exist_ok=True)
          src = Image.open('icon.png').convert('RGBA')
          sizes = [
              ('icon_16x16.png',      16),
              ('icon_16x16@2x.png',   32),
              ('icon_32x32.png',      32),
              ('icon_32x32@2x.png',   64),
              ('icon_128x128.png',   128),
              ('icon_128x128@2x.png',256),
              ('icon_256x256.png',   256),
              ('icon_256x256@2x.png',512),
              ('icon_512x512.png',   512),
          ]
          for name, size in sizes:
              src.resize((size, size), Image.LANCZOS).save(f'icon.iconset/{name}', format='PNG')
          print('Iconset written')
          "
          iconutil -c icns icon.iconset -o icon.icns

      - name: Build Linux icon
        if: runner.os == 'Linux'
        run: |
          pip install pillow -q
          python3 -c "
          from PIL import Image
          img = Image.open('icon.png').convert('RGBA')
          img.save('icon.png')
          "

      - name: Compile Linux and macOS
        if: runner.os != 'Windows'
        run: |
          if [ "$RUNNER_OS" = "macOS" ]; then
            python -m nuitka --onefile --assume-yes-for-downloads --remove-output --output-filename=out --macos-app-icon=icon.icns empy.py
          else
            python -m nuitka --onefile --assume-yes-for-downloads --remove-output --output-filename=out --linux-icon=icon.png empy.py
          fi
          chmod +x out
          mv out ${{ matrix.artifact }}
          chmod +x ${{ matrix.artifact }}

      - name: Build Windows icon
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          pip install pillow -q
          python3 -c "
          from PIL import Image
          img = Image.open('icon.png').convert('RGBA')
          sizes = [(256,256),(128,128),(64,64),(48,48),(32,32),(16,16)]
          img.save('icon.ico', sizes=sizes)
          "

      - name: Compile Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          python -m nuitka --onefile --mingw64 --assume-yes-for-downloads --remove-output --output-filename=out.exe --windows-icon-from-ico=icon.ico empy.py
          Move-Item out.exe ${{ matrix.artifact }}

      - name: Test Linux and macOS
        if: runner.os != 'Windows'
        run: |
          ./${{ matrix.artifact }} --version
          echo hello > /tmp/t.txt
          ./${{ matrix.artifact }} encrypt /tmp/t.txt -p testpassword1 -f
          ./${{ matrix.artifact }} decrypt /tmp/t.txt.empy -p testpassword1 --outdir /tmp/o -f
          diff /tmp/t.txt /tmp/o/t.txt

      - name: Test Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          .\${{ matrix.artifact }} --version
          'hello' | Out-File t.txt -Encoding utf8
          .\${{ matrix.artifact }} encrypt t.txt -p testpassword1 -f
          .\${{ matrix.artifact }} decrypt t.txt.empy -p testpassword1 --outdir o -f

      # Zip macOS and Linux binaries before upload so that the +x executable
      # bit is preserved. actions/upload-artifact strips Unix permissions from
      # raw files, so a plain binary would arrive in the release job as 644.
      # Zip stores permissions internally and survives the round-trip intact.
      - name: Package macOS binary
        if: runner.os == 'macOS'
        run: zip ${{ matrix.artifact }}.zip ${{ matrix.artifact }} install.sh

      - name: Package Linux binary
        if: runner.os == 'Linux'
        run: zip ${{ matrix.artifact }}.zip ${{ matrix.artifact }}

      - name: Upload macOS artifact
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}.zip
          if-no-files-found: error

      - name: Upload Linux artifact
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}.zip
          if-no-files-found: error

      - name: Upload Windows artifact
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: dist/

      - name: Flatten and checksum
        run: |
          python3 flatten.py
          ls -lh dist/
          cd dist && sha256sum * > SHA256SUMS.txt && cat SHA256SUMS.txt

      - uses: softprops/action-gh-release@v2
        with:
          name: empycompress ${{ github.ref_name }}
          body: |
            ## Empyrean Secure Compression ${{ github.ref_name }}
            Copyright Volvi 2026

            | Platform      | File |
            |---------------|------|
            | macOS arm64   | `empy-macos-arm64.zip` |
            | Linux x64     | `empy-linux-x64.zip` |
            | Windows x64   | `empy-windows-x64.exe` |

            ---

            ### macOS setup (one time)

            Download `empy-macos-arm64.zip`, unzip it, then run:

            ```bash
            bash install.sh
            ```

            This marks the binary executable and removes the Gatekeeper quarantine
            flag that macOS applies to all downloaded files.

            To install system-wide:
            ```bash
            sudo mv empy-macos-arm64 /usr/local/bin/empy
            empy
            ```

            ### Linux setup

            ```bash
            unzip empy-linux-x64.zip
            ./empy-linux-x64
            ```

            ### Verify download integrity

            ```bash
            sha256sum -c SHA256SUMS.txt
            ```
          files: |
            dist/empy-linux-x64.zip
            dist/empy-macos-arm64.zip
            dist/empy-windows-x64.exe
            dist/SHA256SUMS.txt
